syntax="proto3";
package mcc;

service AdminService{
  rpc CreateProduct(NewProductRequest) returns (ProductResponse);
  rpc GetProduct(ProductRequest) returns (Product);
  rpc DeleteProduct(ProductRequest) returns (ProductResponse);
  rpc UpdateProduct(UpdateProductRequest) returns (ProductResponse);
  rpc GetStatistik(Empty) returns (StatistikResponse);
  rpc ListProducts(Empty)returns (ProductList);
}
service CustomerService{
  rpc ListProducts(Empty) returns (ProductList);
  rpc BuyProduct(BuyProductRequest) returns (ProductResponse);
}
enum Category{
  CATEGORY_UNSPECIFIED=0;
  T_SHIRT=1;
  KLEIDER=2;
  JACKEN=3;
  HOSEN=4;
  JEANS=5;
  ROCK=6;
  ACCESSOIRES=7;
}
message Product {
string id=1;
string name=2;
double price=3;
Category category=4;
int64 stock=5;
}

message ProductResponse{
  bool success=1;
  string message=2;
}
message ProductRequest{
  string id=1;
}
message NewProductRequest{
  string name=1;
  double price=2;
  Category category=3;
  int64 stock=4;
}
message UpdateProductRequest{
  string id=1;
  double price=2;
  int64 stock=3;
}
message  BuyProductRequest{
  string id=1;
  int32 menge=2;
}
message ProductList{
  repeated Product products=1;
}
message Empty{}

message StatistikResponse{
  int64 verkaufteEinheit=1;
  double gesamtUmsatz=2;
}